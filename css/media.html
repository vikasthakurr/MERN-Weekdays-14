<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .container {
        width: 100vw;
        height: 100vh;
        background-color: beige;
      }
      img {
        width: 400px;
        height: 400px;
      }
      @media (orientation: portrait) {
        img {
          width: 200px;
          height: 200px;
          border-radius: 50%;
        }
      }
      @media (orientation: landscape) {
        img {
          width: 300px;
          height: 300px;
          border-radius: 50%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img
        src="https://images.pexels.com/photos/36682954/pexels-photo-36682954.jpeg"
        alt=""
      />
    </div>
  </body>
</html>
