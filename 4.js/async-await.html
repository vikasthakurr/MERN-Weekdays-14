<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      /**
       * ASYNC AND AWAIT IN JAVASCRIPT
       * 
       * 1. What is 'async'?
       *    - The 'async' keyword is used to declare a function as asynchronous.
       *    - An async function always returns a Promise. If the function returns a value, 
       *      JavaScript automatically wraps it in a resolved Promise.
       * 
       * 2. What is 'await'?
       *    - The 'await' keyword can only be used inside an 'async' function.
       *    - It pauses the execution of the async function until the Promise is settled (resolved or rejected).
       *    - It returns the resolved value of the promise, or throws the rejected value.
       * 
       * 3. Why use Async/Await?
       *    - It provides a cleaner, more readable way to work with asynchronous code compared to .then() chains.
       *    - It makes asynchronous code look and behave more like synchronous code.
       * 
       * 4. Error Handling:
       *    - Use 'try...catch' blocks to handle errors in async functions. 
       *    - This replaces the .catch() method used in Promise chains.
       * 
       * 5. Key Rule:
       *    - You cannot use 'await' in a regular (non-async) function.
       */

      async function fetchData() {
        try {
          console.log("Fetching data...");
          
          // 'await' pauses here until the fetch promise resolves
          const response = await fetch(
            "https://jsonplaceholder.typicode.com/posts/1",
          );
          
          // Check if response is okay
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }

          // 'await' pauses here until the .json() promise resolves
          const data = await response.json();
          
          console.log("Data received successfully:");
          console.log(data);
          
        } catch (error) {
          // Errors from fetch or .json() will be caught here
          console.error("Error fetching data:", error);
        }
      }

      // Calling the async function
      fetchData();
    </script>
  </body>
</html>
