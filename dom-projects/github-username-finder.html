<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Username Finder</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      .search-container {
        max-width: 600px;
        margin: 0 auto;
        background: white;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        margin-bottom: 30px;
      }
      .title {
        color: #333;
        font-weight: 700;
        margin-bottom: 30px;
        text-align: center;
      }
      .search-box {
        position: relative;
        margin-bottom: 20px;
      }
      .search-box input {
        border: 2px solid #e0e0e0;
        border-radius: 50px;
        padding: 12px 20px;
        font-size: 16px;
        transition: all 0.3s ease;
      }
      .search-box input:focus {
        border-color: #667eea;
        box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.1);
        outline: none;
      }
      .btn-search {
        border-radius: 50px;
        padding: 10px 30px;
        font-weight: 600;
        transition: all 0.3s ease;
      }
      .btn-search:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
      }
      .user-card {
        background: white;
        border-radius: 15px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        overflow: hidden;
        max-width: 500px;
        margin: 0 auto 30px;
        animation: slideUp 0.5s ease;
      }
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .user-header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 30px 20px;
        text-align: center;
        color: white;
      }
      .user-avatar {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        border: 5px solid white;
        object-fit: cover;
        margin-bottom: 15px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
      }
      .user-name {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 5px;
      }
      .user-username {
        font-size: 14px;
        opacity: 0.9;
      }
      .user-body {
        padding: 30px 20px;
      }
      .user-bio {
        color: #666;
        margin-bottom: 20px;
        font-size: 14px;
      }
      .stats {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 15px;
        margin-bottom: 20px;
      }
      .stat-item {
        background: #f5f5f5;
        padding: 15px;
        border-radius: 10px;
        text-align: center;
      }
      .stat-number {
        font-size: 24px;
        font-weight: 700;
        color: #667eea;
      }
      .stat-label {
        font-size: 12px;
        color: #999;
        text-transform: uppercase;
        margin-top: 5px;
      }
      .info-row {
        display: flex;
        align-items: center;
        margin-bottom: 12px;
        font-size: 14px;
        color: #666;
      }
      .info-row i {
        width: 20px;
        color: #667eea;
        margin-right: 10px;
      }
      .links {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }
      .btn-link {
        flex: 1;
        border-radius: 8px;
        padding: 10px;
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.3s ease;
      }
      .btn-profile {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
      }
      .btn-profile:hover {
        color: white;
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
      }
      .error-message {
        background: #f8d7da;
        color: #721c24;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
        display: none;
      }
      .error-message.show {
        display: block;
      }
      .loading {
        text-align: center;
        padding: 20px;
        display: none;
      }
      .loading.show {
        display: block;
      }
      .spinner {
        color: #667eea;
      }
      .no-result {
        text-align: center;
        padding: 40px 20px;
        color: #999;
      }
    </style>
  </head>
  <body>
    <div class="search-container">
      <h1 class="title">
        <i class="fab fa-github"></i> GitHub Username Finder
      </h1>

      <div class="search-box">
        <input
          type="text"
          id="searchInput"
          class="form-control"
          placeholder="Enter GitHub username..."
          autocomplete="off"
        />
      </div>

      <button
        class="btn btn-primary btn-search w-100"
        id="searchBtn"
        onclick="searchUser()"
      >
        <i class="fas fa-search"></i> Search
      </button>
    </div>

    <div id="errorMessage" class="error-message"></div>

    <div id="loadingSpinner" class="loading">
      <div class="spinner-border spinner" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <p class="mt-2">Searching...</p>
    </div>

    <div id="userResult"></div>

    <script>
      const searchInput = document.getElementById("searchInput");
      const searchBtn = document.getElementById("searchBtn");
      const errorMessage = document.getElementById("errorMessage");
      const userResult = document.getElementById("userResult");
      const loadingSpinner = document.getElementById("loadingSpinner");

      // Allow search on Enter key
      searchInput.addEventListener("keypress", function (e) {
        if (e.key === "Enter") {
          searchUser();
        }
      });

      // Function to handle the user search logic
      async function searchUser() {
        // Get and trim the username from the input field
        const username = searchInput.value.trim();

        // Validate that the input is not empty
        if (!username) {
          showError("Please enter a username");
          return;
        }

        // Show loading spinner and clear previous results/errors
        showLoading(true);
        errorMessage.classList.remove("show");
        userResult.innerHTML = "";

        try {
          // Fetch user data from GitHub API using the username
          const response = await fetch(
            `https://api.github.com/users/${username}`,
          );

          // Check if the response is successful (status 200)
          if (!response.ok) {
            if (response.status === 404) {
              throw new Error(`User "${username}" not found`);
            } else {
              throw new Error(`Error: ${response.status}`);
            }
          }

          // Parse the JSON data from the response
          const userData = await response.json();
          // Pass the data to the display function
          displayUser(userData);
        } catch (error) {
          // Display any errors that occurred during fetch or parsing
          showError(error.message);
        } finally {
          // Hide loading spinner regardless of success or failure
          showLoading(false);
        }
      }

      // Function to render the user data into the DOM
      function displayUser(user) {
        // Construct the HTML card using a template literal
        const userCard = `
                <div class="user-card">
                    <div class="user-header">
                        <img src="${user.avatar_url}" alt="${user.name}" class="user-avatar">
                        <div class="user-name">${user.name || user.login}</div>
                        <div class="user-username">@${user.login}</div>
                    </div>

                    <div class="user-body">
                        ${user.bio ? `<div class="user-bio">${user.bio}</div>` : ""}

                        <div class="stats">
                            <div class="stat-item">
                                <div class="stat-number">${user.followers}</div>
                                <div class="stat-label">Followers</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-number">${user.following}</div>
                                <div class="stat-label">Following</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-number">${user.public_repos}</div>
                                <div class="stat-label">Repos</div>
                            </div>
                        </div>

                        ${user.location ? `<div class="info-row"><i class="fas fa-map-marker-alt"></i> ${user.location}</div>` : ""}
                        ${user.email ? `<div class="info-row"><i class="fas fa-envelope"></i> ${user.email}</div>` : ""}
                        ${user.blog ? `<div class="info-row"><i class="fas fa-link"></i> <a href="${user.blog}" target="_blank">${user.blog}</a></div>` : ""}
                        ${user.company ? `<div class="info-row"><i class="fas fa-building"></i> ${user.company}</div>` : ""}
                        
                        <div class="info-row">
                            <i class="fas fa-calendar-alt"></i> 
                            Joined ${new Date(user.created_at).toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" })}
                        </div>

                        <div class="links">
                            <a href="${user.html_url}" target="_blank" class="btn btn-link btn-profile">
                                <i class="fab fa-github"></i> View Profile
                            </a>
                        </div>
                    </div>
                </div>
            `;

        // Inject the generated card into the results container
        userResult.innerHTML = userCard;
      }

      // Helper function to show error messages
      function showError(message) {
        errorMessage.textContent = message;
        errorMessage.classList.add("show");
      }

      // Helper function to toggle the loading spinner visibility
      function showLoading(show) {
        if (show) {
          loadingSpinner.classList.add("show");
        } else {
          loadingSpinner.classList.remove("show");
        }
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
